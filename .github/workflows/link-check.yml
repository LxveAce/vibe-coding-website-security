name: link-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          # Pin lychee to the version lychee.toml was validated against.
          lycheeVersion: v0.24.2
          # Settings (accept-list, retries, cache, placeholder excludes,
          # anchor-fragment checking) live in lychee.toml at the repo root.
          args: --no-progress --verbose --config lychee.toml './**/*.md'
          fail: true
